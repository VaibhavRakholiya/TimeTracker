<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlowBoard — Sign In</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#6366f1">
    <script>
        (function() {
            const theme = localStorage.getItem('flowboard-theme') ||
                (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
</head>
<body>
    <div class="login-page">
        <!-- Branding panel -->
        <div class="login-branding">
            <div class="login-brand-logo">
                <i class="fa-solid fa-diagram-project" style="color:#fff;"></i>
            </div>
            <div class="login-brand-name">FlowBoard</div>
            <div class="login-brand-tagline">The modern workspace for teams who ship great things.</div>

            <div class="login-features">
                <div class="login-feature-item">
                    <div class="login-feature-icon"><i class="fa-solid fa-table-columns"></i></div>
                    <span>Kanban boards with custom workflows</span>
                </div>
                <div class="login-feature-item">
                    <div class="login-feature-icon"><i class="fa-solid fa-bolt"></i></div>
                    <span>Sprint planning &amp; backlog management</span>
                </div>
                <div class="login-feature-item">
                    <div class="login-feature-icon"><i class="fa-solid fa-chart-gantt"></i></div>
                    <span>Timeline &amp; roadmap visualization</span>
                </div>
                <div class="login-feature-item">
                    <div class="login-feature-icon"><i class="fa-solid fa-clock"></i></div>
                    <span>Built-in time tracking &amp; reports</span>
                </div>
            </div>
        </div>

        <!-- Form panel -->
        <div class="login-form-panel">
            <!-- Theme toggle -->
            <button class="login-theme-toggle" id="themeToggle" title="Toggle theme">
                <i class="fa-solid fa-moon" id="themeIcon"></i>
            </button>

            <div class="login-form-title">Welcome back</div>
            <div class="login-form-subtitle">Sign in to your FlowBoard workspace</div>

            <form class="login-form" id="loginForm" autocomplete="off">
                <div class="login-form-group">
                    <label class="login-form-label" for="username">Username</label>
                    <input
                        class="login-form-input"
                        type="text"
                        id="username"
                        name="username"
                        placeholder="Enter your username"
                        autocomplete="username"
                        required
                    />
                </div>

                <div class="login-form-group">
                    <label class="login-form-label" for="password">Password</label>
                    <div style="position:relative;">
                        <input
                            class="login-form-input"
                            type="password"
                            id="password"
                            name="password"
                            placeholder="Enter your password"
                            autocomplete="current-password"
                            required
                            style="padding-right:44px;"
                        />
                        <button
                            type="button"
                            id="togglePassword"
                            style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-tertiary);cursor:pointer;padding:4px;font-size:16px;"
                            title="Toggle password visibility"
                        >
                            <i class="fa-solid fa-eye" id="eyeIcon"></i>
                        </button>
                    </div>
                </div>

                <div class="login-error" id="loginError">
                    <i class="fa-solid fa-circle-exclamation"></i>
                    <span id="loginErrorText">Invalid username or password. Please try again.</span>
                </div>

                <button type="submit" class="login-submit" id="loginBtn">
                    <span id="loginBtnText">Sign In</span>
                    <span id="loginSpinner" style="display:none;">
                        <span class="spinner" style="width:16px;height:16px;border-width:2px;"></span>
                    </span>
                </button>
            </form>
        </div>
    </div>

    <script>
        // ── Theme toggle ──────────────────────────────────────
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon   = document.getElementById('themeIcon');

        function applyTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('flowboard-theme', theme);
            themeIcon.className = theme === 'dark' ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
        }

        themeToggle.addEventListener('click', () => {
            const current = document.documentElement.getAttribute('data-theme') || 'dark';
            applyTheme(current === 'dark' ? 'light' : 'dark');
        });

        // Set correct icon on load
        const initialTheme = document.documentElement.getAttribute('data-theme') || 'dark';
        themeIcon.className = initialTheme === 'dark' ? 'fa-solid fa-sun' : 'fa-solid fa-moon';

        // ── Password visibility toggle ────────────────────────
        const passwordInput  = document.getElementById('password');
        const togglePassword = document.getElementById('togglePassword');
        const eyeIcon        = document.getElementById('eyeIcon');

        togglePassword.addEventListener('click', () => {
            const isHidden = passwordInput.type === 'password';
            passwordInput.type = isHidden ? 'text' : 'password';
            eyeIcon.className  = isHidden ? 'fa-solid fa-eye-slash' : 'fa-solid fa-eye';
        });

        // ── Login form ────────────────────────────────────────
        const loginForm    = document.getElementById('loginForm');
        const loginError   = document.getElementById('loginError');
        const loginBtn     = document.getElementById('loginBtn');
        const loginBtnText = document.getElementById('loginBtnText');
        const loginSpinner = document.getElementById('loginSpinner');
        const errorText    = document.getElementById('loginErrorText');

        const CREDENTIALS = { admin: 'password123' };

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            loginError.classList.remove('visible');

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            if (!username || !password) {
                errorText.textContent = 'Please fill in all fields.';
                loginError.classList.add('visible');
                return;
            }

            // Show spinner
            loginBtnText.style.display = 'none';
            loginSpinner.style.display = 'inline-flex';
            loginBtn.disabled = true;

            // Simulate auth delay
            await new Promise(r => setTimeout(r, 500));

            if (CREDENTIALS[username] && CREDENTIALS[username] === password) {
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('username', username);
                localStorage.setItem('loginTime', new Date().toISOString());
                window.location.href = 'index.html';
            } else {
                loginBtnText.style.display = 'inline';
                loginSpinner.style.display = 'none';
                loginBtn.disabled = false;
                errorText.textContent = 'Invalid username or password. Please try again.';
                loginError.classList.add('visible');
                document.getElementById('username').classList.add('error');
                document.getElementById('password').classList.add('error');
                document.getElementById('username').addEventListener('input', () => {
                    document.getElementById('username').classList.remove('error');
                    document.getElementById('password').classList.remove('error');
                }, { once: true });
            }
        });

        // ── Redirect if already logged in ─────────────────────
        if (localStorage.getItem('isLoggedIn') === 'true') {
            window.location.href = 'index.html';
        }

        // ── Service Worker registration ───────────────────────
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').catch(() => {});
        }
    </script>
</body>
</html>
