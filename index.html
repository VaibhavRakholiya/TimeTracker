<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimeTracker -
        Task Management</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- PWA Setup -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f0f13">
    <link rel="apple-touch-icon" href="/icons/icon.svg">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <!-- Firebase REST API Integration - No SDK Required -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <!-- Firebase Configuration -->
    <script src="firebase-config.js"></script>
    <script src="firebase-rest-integration.js"></script>
</head>

<body>
    <!-- Database Loader -->
    <div id="databaseLoader" class="database-loader" style="display: none;">
        <div class="loader-content">
            <div class="loader-spinner"></div>
            <div class="loader-text">Connecting to database...</div>
        </div>
    </div>

    <!-- Inspiring Quote Section -->
    <div class="quote-container">
        <div class="quote-content">
            <div class="quote-text" id="quoteText"></div>
            <div class="quote-author" id="quoteAuthor"></div>
        </div>
    </div>



    <div class="container">
        <aside>
            <!-- <div class="sidebar-header"> -->
            <!-- <h2>TimeTracker</h2> -->

            <!-- </div> -->

        </aside>

        <div class="user-info">
            <span class="username" id="usernameDisplay">Admin</span>
            <button class="logout-btn" id="logoutBtn" title="Logout">
                <i class="fas fa-sign-out-alt"></i>
            </button>
        </div>

        <main class="main-content">
            <header class="top-bar">
                <div class="top-bar-left">
                    <h1 id="currentProjectName">All Tasks</h1>
                </div>
                <div class="top-bar-right">
                    <div class="custom-project-dropdown" id="customProjectDropdown">
                        <div class="custom-project-dropdown-trigger" id="customProjectDropdownTrigger">
                            <span id="customProjectDropdownSelected">All Tasks</span>
                            <i class="fas fa-chevron-down"></i>
                        </div>
                        <div class="custom-project-dropdown-menu" id="customProjectDropdownMenu">
                            <ul id="projectsList" class="custom-projects-list">
                            </ul>
                        </div>
                    </div>
                    <div class="current-task-display" id="currentTaskDisplay" style="display: none;">
                        <div class="current-task-info">
                            <i class="fas fa-play-circle"></i>
                            <span class="current-task-title" id="currentTaskTitle"></span>
                        </div>
                        <div class="current-task-timer">
                            <i class="fas fa-circle-notch fa-spin"></i>
                            <span id="currentTaskTimer">00:00:00</span>
                        </div>
                    </div>
                    <div class="today-time-display" id="todayTimeDisplay">
                        <i class="fas fa-clock"></i>
                        <span id="todayTimeValue">00:00:00</span>
                    </div>
                </div>
            </header>

            <div class="view-controls">
                <button id="boardViewBtn" class="view-btn active"><i class="fas fa-columns"></i> Board</button>
                <button id="listViewBtn" class="view-btn"><i class="fas fa-list-ul"></i> List</button>
                <button id="timesheetViewBtn" class="view-btn"><i class="fas fa-clock"></i> TimeSheet</button>
            </div>

            <div id="boardView" class="board">
                <div class="board-header">
                    <div class="board-filters">
                        <div class="filter-group">
                            <label>Status:</label>
                            <select id="boardFilterStatus">
                                <option value="All">All</option>
                                <option value="Backlog">Backlog</option>
                                <option value="To Do">To Do</option>
                                <option value="In Progress">In Progress</option>
                                <option value="In Review">In Review</option>
                                <option value="Done">Done</option>
                            </select>
                        </div>
                        <div class="filter-group">
                            <label>Deadline:</label>
                            <select id="boardFilterDeadline">
                                <option value="All">All Dates</option>
                                <option value="Overdue">Overdue</option>
                                <option value="Today">Today</option>
                                <option value="This Week">This Week</option>
                                <option value="Upcoming">Upcoming</option>
                                <option value="No Date">No Date</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="board-columns">
                    <div class="column" data-status="Backlog">
                        <div class="column-header">
                            <h3><i class="fas fa-list-ul"></i> Backlog</h3>
                        </div>
                        <div class="backlog-input-container">
                            <input type="text" class="backlog-input" id="backlogInput" placeholder="Add backlog item..."
                                data-status="Backlog">
                            <button class="backlog-add-btn" onclick="addBacklogItem('Backlog')">
                                <i class="fas fa-plus"></i>
                            </button>
                        </div>
                        <div class="backlog-container" id="backlogItems"></div>
                    </div>
                    <div class="column" data-status="To Do">
                        <div class="column-header">
                            <h3><i class="fas fa-clipboard-list"></i> To Do</h3>
                            <button class="add-task-btn" onclick="openAddTaskModal()">
                                <i class="fas fa-plus"></i>
                            </button>
                        </div>
                        <div class="tasks-container" id="todoTasks"></div>
                    </div>
                    <div class="column" data-status="Done">
                        <div class="column-header">
                            <h3><i class="fas fa-check-circle"></i> Done</h3>
                        </div>
                        <div class="tasks-container" id="doneTasks"></div>
                    </div>
                </div>
            </div>

            <div id="timesheetView" class="timesheet-view" style="display: none;">
                <div class="timesheet-filters">
                    <div class="date-filter">
                        <label>Date:</label>
                        <input type="date" id="timesheetDate">
                    </div>
                </div>
                <table class="timesheet-table">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Project</th>
                            <th>Task</th>
                            <th>Status</th>
                            <th>Due Date</th>
                            <th>Time Spent</th>
                        </tr>
                    </thead>
                    <tbody id="timesheetBody"></tbody>
                </table>
            </div>

        <!-- List View -->
        <div id="listView" class="list-view" style="display: none;">
            <div class="list-filters">
                <div class="filter-group">
                        <label>Status:</label>
                        <select id="listFilterStatus">
                            <option value="All">All</option>
                            <option value="Backlog">Backlog</option>
                            <option value="To Do">To Do</option>
                            <option value="In Progress">In Progress</option>
                            <option value="In Review">In Review</option>
                            <option value="Done">Done</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label>Deadline:</label>
                        <select id="listFilterDeadline">
                            <option value="All">All Dates</option>
                            <option value="Overdue">Overdue</option>
                            <option value="Today">Today</option>
                            <option value="This Week">This Week</option>
                            <option value="Upcoming">Upcoming</option>
                            <option value="No Date">No Date</option>
                        </select>
                    </div>
                </div>
                <div class="list-view-header">
                    <div class="list-col list-col-title">Task</div>
                    <div class="list-col list-col-status">Status</div>
                    <div class="list-col list-col-project">Project</div>
                    <div class="list-col list-col-due">Due Date</div>
                    <div class="list-col list-col-time">Time</div>
                    <div class="list-col list-col-actions"></div>
                </div>
                <div id="listViewBody" class="list-view-body"></div>
            </div>


        </main>
    </div>

    <!-- Modal for adding/editing tasks -->
    <div id="taskModal" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle">Add Task</h2>
            <form id="taskForm">
                <div class="form-group">
                    <label for="taskTitle">Task Title</label>
                    <input type="text" id="taskTitle" required>
                </div>
                <div class="form-group">
                    <label for="taskStatus">Status</label>
                    <select id="taskStatus">
                        <option value="To Do">To Do</option>
                        <option value="Done">Done</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="taskDueDate">Due Date</label>
                    <input type="date" id="taskDueDate">
                </div>
                <div class="modal-buttons">
                    <button type="submit" class="btn-primary">Save</button>
                    <button type="button" class="btn-secondary" id="cancelTaskBtn">Cancel</button>
                    <button type="button" class="btn-delete" id="deleteTaskBtn" style="display: none;">
                        <i class="fas fa-trash-alt"></i> Delete Task
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal for adding/editing projects -->
    <div id="projectModal" class="modal">
        <div class="modal-content">
            <h2 id="projectModalTitle">Add Project</h2>
            <form id="projectForm">
                <div class="form-group">
                    <label for="projectName">Project Name</label>
                    <input type="text" id="projectName" required>
                </div>
                <div class="form-group">
                    <label>Project Emoji</label>
                    <div class="emoji-picker">
                        <div class="emoji-grid">
                            <span class="emoji-option" data-emoji="🎯">🎯</span>
                            <span class="emoji-option" data-emoji="💻">💻</span>
                            <span class="emoji-option" data-emoji="📱">📱</span>
                            <span class="emoji-option" data-emoji="🎨">🎨</span>
                            <span class="emoji-option" data-emoji="📊">📊</span>
                            <span class="emoji-option" data-emoji="🚀">🚀</span>
                            <span class="emoji-option" data-emoji="🔧">🔧</span>
                            <span class="emoji-option" data-emoji="📝">📝</span>
                            <span class="emoji-option" data-emoji="🎮">🎮</span>
                            <span class="emoji-option" data-emoji="📚">📚</span>
                            <span class="emoji-option" data-emoji="💡">💡</span>
                            <span class="emoji-option" data-emoji="⭐">⭐</span>
                            <span class="emoji-option" data-emoji="🏠">🏠</span>
                            <span class="emoji-option" data-emoji="🎵">🎵</span>
                            <span class="emoji-option" data-emoji="🎬">🎬</span>
                            <span class="emoji-option" data-emoji="🏃">🏃</span>
                            <span class="emoji-option" data-emoji="🎪">🎪</span>
                            <span class="emoji-option" data-emoji="🏢">🏢</span>
                            <span class="emoji-option" data-emoji="🌍">🌍</span>
                            <span class="emoji-option" data-emoji="🎓">🎓</span>
                            <span class="emoji-option" data-emoji="💼">💼</span>
                            <span class="emoji-option" data-emoji="🔬">🔬</span>
                            <span class="emoji-option" data-emoji="🎭">🎭</span>
                            <span class="emoji-option" data-emoji="🏆">🏆</span>
                            <span class="emoji-option" data-emoji="💎">💎</span>
                            <span class="emoji-option" data-emoji="🌟">🌟</span>
                        </div>
                        <div class="selected-emoji-display">
                            <span id="selectedEmoji">🎯</span>
                            <small>Click an emoji above to select</small>
                        </div>
                    </div>
                </div>
                <div class="modal-buttons">
                    <button type="submit" class="btn-primary" id="saveProjectBtn">Save</button>
                    <button type="button" class="btn-secondary" id="cancelProjectBtn">Cancel</button>
                    <button type="button" class="btn-delete" id="deleteProjectBtn" style="display: none;">
                        <i class="fas fa-trash-alt"></i> Delete Project
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Check authentication before loading the app
        if (localStorage.getItem('isLoggedIn') !== 'true') {
            window.location.href = 'login.html';
        }
    </script>
    <script src="app.js"></script>

    <!-- Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(registration => {
                        console.log('ServiceWorker registration successful with scope: ', registration.scope);
                    }, err => {
                        console.log('ServiceWorker registration failed: ', err);
                    });
            });
        }
    </script>
</body>

</html>
